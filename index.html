<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Оценка курса по вебу</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <main class="page">
            <section class="rating-card" aria-labelledby="rating-title">
                <h1 class="rating-title" id="rating-title">Поставь оценочку</h1>

                <fieldset class="rating" aria-label="5 star rating">
                    <input
                        class="rating-input"
                        type="radio"
                        name="stars"
                        id="star-5"
                        value="5"
                    />
                    <label class="rating-star" for="star-5"></label>

                    <input
                        class="rating-input"
                        type="radio"
                        name="stars"
                        id="star-4"
                        value="4"
                    />
                    <label class="rating-star" for="star-4"></label>

                    <input
                        class="rating-input"
                        type="radio"
                        name="stars"
                        id="star-3"
                        value="3"
                    />
                    <label class="rating-star" for="star-3"></label>

                    <input
                        class="rating-input"
                        type="radio"
                        name="stars"
                        id="star-2"
                        value="2"
                    />
                    <label class="rating-star" for="star-2"></label>

                    <input
                        class="rating-input"
                        type="radio"
                        name="stars"
                        id="star-1"
                        value="1"
                    />
                    <label class="rating-star" for="star-1"></label>
                </fieldset>
            </section>
        </main>
    </body>
</html>
